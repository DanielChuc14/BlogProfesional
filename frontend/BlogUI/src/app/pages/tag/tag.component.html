<div class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">#{{ slug() }}</h1>

  @if (loading()) {
    <app-spinner />
  } @else if (posts().length === 0) {
    <p class="text-gray-400 text-center py-16">{{ 'tag_noPostsYet' | translate }}</p>
  } @else {
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (post of posts(); track post.id) {
        <app-post-card [post]="post" />
      }
    </div>

    @if (hasMore()) {
      <div class="mt-8 flex justify-center">
        <button class="btn btn-secondary" (click)="loadMore()" [disabled]="loadingMore()">
          @if (loadingMore()) { {{ 'common_loading' | translate }} } @else { {{ 'common_loadMore' | translate }} }
        </button>
      </div>
    }
  }
</div>
