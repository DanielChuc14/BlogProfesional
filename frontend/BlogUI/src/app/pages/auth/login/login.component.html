<div class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="card p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">{{ 'auth_welcomeBack' | translate }}</h1>
        <p class="text-sm text-gray-500 mt-1">{{ 'auth_signInDesc' | translate }}</p>
      </div>

      <form (ngSubmit)="submit()" #loginForm="ngForm" class="flex flex-col gap-4">
        <div>
          <label class="label" for="email">{{ 'auth_email' | translate }}</label>
          <input id="email" type="email" class="input"
            placeholder="you@example.com"
            [(ngModel)]="email" name="email" required />
        </div>

        <div>
          <label class="label" for="password">{{ 'auth_password' | translate }}</label>
          <input id="password" type="password" class="input"
            placeholder="Your password"
            [(ngModel)]="password" name="password" required />
        </div>

        <div class="flex justify-end">
          <a routerLink="/forgot-password" class="text-sm">{{ 'auth_forgotPassword' | translate }}</a>
        </div>

        @if (errorMsg()) {
          <p class="text-sm text-red-600 bg-red-50 rounded-md px-3 py-2">{{ errorMsg() }}</p>
        }

        <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
          @if (loading()) { {{ 'auth_signingIn' | translate }} } @else { {{ 'auth_signIn' | translate }} }
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        {{ 'auth_noAccount' | translate }} <a routerLink="/register">{{ 'auth_getStarted' | translate }}</a>
      </p>
    </div>
  </div>
</div>
