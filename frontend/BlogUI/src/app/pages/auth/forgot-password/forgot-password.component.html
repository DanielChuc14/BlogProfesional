<div class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="card p-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ 'auth_forgotPasswordTitle' | translate }}</h1>
      <p class="text-sm text-gray-500 mb-6">{{ 'auth_forgotPasswordDesc' | translate }}</p>

      @if (sent()) {
        <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-sm text-green-700">
          {{ 'auth_resetLinkSent' | translate }}
        </div>
        <a routerLink="/login" class="btn btn-secondary w-full mt-4 no-underline text-center block">
          {{ 'auth_backToLogin' | translate }}
        </a>
      } @else {
        <form (ngSubmit)="submit()" class="flex flex-col gap-4">
          <div>
            <label class="label" for="email">{{ 'auth_email' | translate }}</label>
            <input id="email" type="email" class="input"
              placeholder="you@example.com"
              [(ngModel)]="email" name="email" required />
          </div>

          @if (errorMsg()) {
            <p class="text-sm text-red-600 bg-red-50 rounded-md px-3 py-2">{{ errorMsg() }}</p>
          }

          <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
            @if (loading()) { {{ 'auth_sending' | translate }} } @else { {{ 'auth_sendResetLink' | translate }} }
          </button>
        </form>

        <div class="text-center mt-4">
          <a routerLink="/login" class="text-sm">{{ 'auth_backToLogin' | translate }}</a>
        </div>
      }
    </div>
  </div>
</div>
