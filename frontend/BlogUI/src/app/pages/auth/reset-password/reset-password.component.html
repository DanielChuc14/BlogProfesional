<div class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="card p-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ 'auth_resetPasswordTitle' | translate }}</h1>

      <form (ngSubmit)="submit()" class="flex flex-col gap-4">
        <div>
          <label class="label" for="password">{{ 'auth_newPassword' | translate }}</label>
          <input id="password" type="password" class="input"
            placeholder="At least 8 characters"
            [(ngModel)]="password" name="password" required />
        </div>

        @if (errorMsg()) {
          <p class="text-sm text-red-600 bg-red-50 rounded-md px-3 py-2">{{ errorMsg() }}</p>
        }

        <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
          @if (loading()) { {{ 'auth_resetting' | translate }} } @else { {{ 'auth_resetPassword' | translate }} }
        </button>
      </form>
    </div>
  </div>
</div>
