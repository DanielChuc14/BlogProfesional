<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
    <h2 class="text-lg font-bold text-gray-900 mb-4">{{ 'report_title' | translate }}</h2>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'report_reason' | translate }}</label>
      <select class="input w-full" [(ngModel)]="selectedReason">
        @for (r of reasons; track r.value) {
          <option [value]="r.value">{{ r.label | translate }}</option>
        }
      </select>
    </div>

    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-1">
        {{ 'report_details' | translate }}
        <span class="text-gray-400 font-normal">{{ 'report_optional' | translate }}</span>
      </label>
      <textarea class="input resize-none w-full" rows="3" maxlength="500"
        [placeholder]="'report_describePlaceholder' | translate"
        [(ngModel)]="description"></textarea>
      <p class="text-xs text-gray-400 mt-1 text-right">{{ description.length }}/500</p>
    </div>

    <div class="flex justify-end gap-2">
      <button class="btn btn-ghost btn-sm" [disabled]="submitting()" (click)="cancel()">
        {{ 'report_cancel' | translate }}
      </button>
      <button class="btn btn-error btn-sm" [disabled]="submitting()" (click)="submit()">
        {{ (submitting() ? 'report_submitting' : 'report_submit') | translate }}
      </button>
    </div>
  </div>
</div>
